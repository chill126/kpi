                    </button>
                    {isOpen && (
                        <div style={{ padding: '20px 24px' }}>
                            <div style={{ display: 'flex', gap: '12px', marginBottom: '16px' }}>
                                <input type="text" value={inputValue} onChange={e => onInputChange(e.target.value)}
                                    placeholder={`Add new ${title.toLowerCase().slice(0, -1)}...`} 
                                    style={{ flex: 1, padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px' }}
                                    onKeyDown={e => e.key === 'Enter' && onAdd()} />
                                <button onClick={onAdd}
                                    style={{ padding: '12px 24px', background: '#22c55e', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>
                                    + Add
                                </button>
                            </div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                                {items.map(item => (
                                    <div key={item} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: '#f1f5f9', borderRadius: '8px' }}>
                                        <span style={{ fontSize: '14px' }}>{item}</span>
                                        <button onClick={() => onRemove(item)}
                                            style={{ width: '20px', height: '20px', background: '#ef4444', color: 'white', border: 'none', borderRadius: '50%', cursor: 'pointer', fontSize: '12px', lineHeight: '1' }}>
                                            ×
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // CollapsibleCard Component for Manage tab sections
        const CollapsibleCard = ({ title, icon, children, defaultOpen = false }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            
            return (
                <div style={{ background: 'white', borderRadius: '16px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', overflow: 'hidden' }}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        style={{ 
                            width: '100%', 
                            padding: '20px 24px', 
                            background: 'white', 
                            border: 'none', 
                            cursor: 'pointer',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            borderBottom: isOpen ? '1px solid #e2e8f0' : 'none'
                        }}
                    >
                        <h2 style={{ fontSize: '18px', fontWeight: 700, color: '#1e293b', margin: 0 }}>{icon} {title}</h2>
                        <span style={{ 
                            transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', 
                            transition: 'transform 0.2s',
                            fontSize: '14px',
                            color: '#64748b'
                        }}>▶</span>
                    </button>
                    {isOpen && (
                        <div style={{ padding: '20px 24px' }}>
                            {children}
                        </div>
                    )}
                </div>
            );
        };

        // Manage Component
        const Manage = ({ investigators, setInvestigators, studies, setStudies, metrics, setMetrics, assessments, setAssessments, entries, setEntries, assessmentEntries, setAssessmentEntries }) => {
            const [newInvestigator, setNewInvestigator] = useState('');
            const [newStudy, setNewStudy] = useState('');
            const [newMetric, setNewMetric] = useState('');
            const [newAssessment, setNewAssessment] = useState('');
            const [userName, setUserName] = useState(() => loadData('kpi_user_name', ''));
            const fileInputRef = useRef(null);
            const userFileInputRef = useRef(null);

            // Save user name
            useEffect(() => { saveData('kpi_user_name', userName); }, [userName]);

            const addInvestigator = () => {
                if (newInvestigator.trim() && !investigators.includes(newInvestigator.trim())) {
                    setInvestigators([...investigators, newInvestigator.trim()]);
                    setNewInvestigator('');
                }
            };
            const addStudy = () => {
                if (newStudy.trim() && !studies.includes(newStudy.trim())) {
                    setStudies([...studies, newStudy.trim()]);
                    setNewStudy('');
                }
            };
            const addMetric = () => {
                if (newMetric.trim() && !metrics.includes(newMetric.trim())) {
                    setMetrics([...metrics, newMetric.trim()]);
                    setNewMetric('');
                }
            };
            const addAssessment = () => {
                if (newAssessment.trim() && !assessments.includes(newAssessment.trim())) {
                    setAssessments([...assessments, newAssessment.trim()]);
                    setNewAssessment('');
                }
            };

            const removeItem = (item, setter, list) => {
                if (confirm(`Remove "${item}"?`)) {
                    setter(list.filter(i => i !== item));
                }
            };

            // Export user entries only (Data Entry + Assessments)
            const exportUserEntries = () => {
                if (!userName.trim()) {
                    alert('Please enter your name first so your entries can be identified.');
                    return;
                }
                
                // Tag entries with user name if not already tagged
                const taggedEntries = entries.map(e => ({ ...e, loggedBy: e.loggedBy || userName.trim() }));
                const taggedAssessments = assessmentEntries.map(e => ({ ...e, loggedBy: e.loggedBy || userName.trim() }));
                
                const exportData = {
                    exportDate: new Date().toISOString(),
                    exportType: 'user_entries',
                    exportedBy: userName.trim(),
                    version: '1.0',
                    data: {
                        entries: taggedEntries,
                        assessmentEntries: taggedAssessments
                    }
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kpi-entries-${userName.trim().replace(/\s+/g, '-')}-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // Import user entries (merge with duplicate detection)
            const importUserEntries = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importData = JSON.parse(e.target.result);
                        
                        if (importData.exportType !== 'user_entries' || !importData.data) {
                            alert('Invalid user entries file. Please use a file exported with "Export My Entries".');
                            return;
                        }
                        
                        const importedEntries = importData.data.entries || [];
                        const importedAssessments = importData.data.assessmentEntries || [];
                        
                        // Get existing IDs to prevent duplicates
                        const existingEntryIds = new Set(entries.map(e => e.id));
                        const existingAssessmentIds = new Set(assessmentEntries.map(e => e.id));
                        
                        // Filter out duplicates
                        const newEntries = importedEntries.filter(e => !existingEntryIds.has(e.id));
                        const newAssessments = importedAssessments.filter(e => !existingAssessmentIds.has(e.id));
                        
                        const duplicateEntries = importedEntries.length - newEntries.length;
                        const duplicateAssessments = importedAssessments.length - newAssessments.length;
                        
                        if (newEntries.length === 0 && newAssessments.length === 0) {
                            alert(`No new entries to import. All ${duplicateEntries + duplicateAssessments} entries already exist.`);
                            return;
                        }
                        
                        const confirmMsg = `Import from ${importData.exportedBy || 'unknown'}?\n\n` +
                            `• ${newEntries.length} new Data Entry records\n` +
                            `• ${newAssessments.length} new Assessment records\n` +
                            (duplicateEntries + duplicateAssessments > 0 ? `• ${duplicateEntries + duplicateAssessments} duplicates will be skipped\n` : '') +
                            `\nContinue?`;
                        
                        if (!confirm(confirmMsg)) return;
                        
                        // Merge new entries
                        if (newEntries.length > 0) {
                            setEntries(prev => [...prev, ...newEntries]);
                        }
                        if (newAssessments.length > 0) {
                            setAssessmentEntries(prev => [...prev, ...newAssessments]);
                        }
                        
                        alert(`Successfully imported:\n• ${newEntries.length} Data Entry records\n• ${newAssessments.length} Assessment records`);
                    } catch (err) {
                        alert('Error reading file: ' + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            // Export all data to JSON file
            const exportAllData = () => {
                const dataKeys = [
                    'kpi_investigators',
                    'kpi_studies', 
                    'kpi_metrics',
                    'kpi_assessments',
                    'kpi_entries',
                    'kpi_assessment_entries',
                    'kpi_study_data',
                    'kpi_randomization_data',
                    'kpi_study_details_data',
                    'kpi_participant_data',
                    'kpi_study_active_status',
                    'kpi_study_visit_types'
                ];
                
                const exportData = {
                    exportDate: new Date().toISOString(),
                    version: '1.0',
                    data: {}
                };
                
                dataKeys.forEach(key => {
                    const value = localStorage.getItem(key);
                    if (value) {
                        exportData.data[key] = JSON.parse(value);
                    }
                });
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kpi-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // Import data from JSON file
            const importAllData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importData = JSON.parse(e.target.result);
                        
                        if (!importData.data) {
                            alert('Invalid backup file format.');
                            return;
                        }
                        
                        if (!confirm(`This will replace ALL current data with the backup from ${importData.exportDate ? new Date(importData.exportDate).toLocaleString() : 'unknown date'}. Continue?`)) {
                            return;
                        }
                        
                        // Restore all data
                        Object.keys(importData.data).forEach(key => {
                            localStorage.setItem(key, JSON.stringify(importData.data[key]));
                        });
                        
                        alert('Data restored successfully! The page will now reload.');
                        window.location.reload();
                    } catch (err) {
                        alert('Error reading backup file: ' + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    {/* Backup & Restore Section */}
                    <CollapsibleCard title="Backup & Restore" icon="💾" defaultOpen={false}>
                        <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '16px' }}>
                            <button 
                                onClick={exportAllData}
                                style={{ 
                                    padding: '12px 24px', 
                                    background: 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)', 
                                    color: 'white', 
                                    border: 'none', 
                                    borderRadius: '8px', 
                                    fontWeight: 600, 
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px'
                                }}>
                                📥 Export All Data
                            </button>
                            <input 
                                type="file" 
                                ref={fileInputRef}
                                onChange={importAllData}
                                accept=".json"
                                style={{ display: 'none' }}
                            />
                            <button 
                                onClick={() => fileInputRef.current?.click()}
                                style={{ 
                                    padding: '12px 24px', 
                                    background: 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)', 
                                    color: 'white', 
                                    border: 'none', 
                                    borderRadius: '8px', 
                                    fontWeight: 600, 
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px'
                                }}>
                                📤 Import Data from Backup
                            </button>
                        </div>
                        <p style={{ fontSize: '13px', color: '#64748b', margin: 0 }}>
                            💡 <strong>Tip:</strong> Regularly export your data to create backups. If you ever lose data, you can import a backup file to restore everything.
                        </p>
                    </CollapsibleCard>

                    {/* User Data Sharing Section */}
                    <CollapsibleCard title="Team Data Sharing" icon="👥" defaultOpen={false}>
                        <div style={{ marginBottom: '16px' }}>
                            <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Your Name (required for export)</label>
                            <input 
                                type="text"
                                value={userName}
                                onChange={e => setUserName(e.target.value)}
                                placeholder="Enter your name..."
                                style={{ 
                                    padding: '10px 14px', 
                                    border: '2px solid #e2e8f0', 
                                    borderRadius: '8px', 
                                    fontSize: '14px',
                                    width: '300px',
                                    maxWidth: '100%'
                                }}
                            />
                        </div>
                        <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '16px' }}>
                            <button 
                                onClick={exportUserEntries}
                                style={{ 
                                    padding: '12px 24px', 
                                    background: 'linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%)', 
                                    color: 'white', 
                                    border: 'none', 
                                    borderRadius: '8px', 
                                    fontWeight: 600, 
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px'
                                }}>
                                📤 Export My Entries
                            </button>
                            <input 
                                type="file" 
                                ref={userFileInputRef}
                                onChange={importUserEntries}
                                accept=".json"
                                style={{ display: 'none' }}
                            />
                            <button 
                                onClick={() => userFileInputRef.current?.click()}
                                style={{ 
                                    padding: '12px 24px', 
                                    background: 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)', 
                                    color: 'white', 
                                    border: 'none', 
                                    borderRadius: '8px', 
                                    fontWeight: 600, 
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px'
                                }}>
                                📥 Import Team Member Entries
                            </button>
                        </div>
                        <div style={{ background: '#f8fafc', borderRadius: '8px', padding: '16px', border: '1px solid #e2e8f0' }}>
                            <p style={{ fontSize: '13px', color: '#475569', margin: '0 0 8px 0', fontWeight: 600 }}>How Team Sharing Works:</p>
                            <ul style={{ fontSize: '13px', color: '#64748b', margin: 0, paddingLeft: '20px' }}>
                                <li style={{ marginBottom: '4px' }}><strong>Export My Entries</strong> — Creates a file with ONLY your Data Entry and Assessment records (tagged with your name)</li>
                                <li style={{ marginBottom: '4px' }}><strong>Import Team Member Entries</strong> — Merges another person's entries into your master. Duplicates are automatically skipped.</li>
                                <li>Each entry has a unique ID, so the same file can't create duplicate records.</li>
                            </ul>
                        </div>
                    </CollapsibleCard>

                    <ManageSection 
                        title="Investigators" 
                        items={investigators} 
                        onAdd={addInvestigator}
                        onRemove={(item) => removeItem(item, setInvestigators, investigators)}
                        inputValue={newInvestigator}
                        onInputChange={setNewInvestigator}
                        icon="👤" 
                    />
                    <ManageSection 
                        title="Studies" 
                        items={studies} 
                        onAdd={addStudy}
                        onRemove={(item) => removeItem(item, setStudies, studies)}
                        inputValue={newStudy}
                        onInputChange={setNewStudy}
                        icon="📚" 
                    />
                    <ManageSection 
                        title="Metrics" 
                        items={metrics} 
                        onAdd={addMetric}
                        onRemove={(item) => removeItem(item, setMetrics, metrics)}
                        inputValue={newMetric}
                        onInputChange={setNewMetric}
                        icon="📊" 
                    />
                    <ManageSection 
                        title="Assessments" 
                        items={assessments} 
                        onAdd={addAssessment}
                        onRemove={(item) => removeItem(item, setAssessments, assessments)}
                        inputValue={newAssessment}
                        onInputChange={setNewAssessment}
                        icon="📋" 
                    />

                    <CollapsibleCard title="Danger Zone" icon="⚠️" defaultOpen={false}>
                        <button onClick={() => { if (confirm('Clear ALL data? This cannot be undone!')) { localStorage.clear(); window.location.reload(); }}}
                            style={{ padding: '12px 24px', background: '#ef4444', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>
                            🗑️ Reset All Data
                        </button>
                    </CollapsibleCard>
                </div>
            );
        };

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
