<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator KPI Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f1f5f9; min-height: 100vh; }
        #root { min-height: 100vh; }
        .sync-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 12px; }
        .sync-indicator.synced { background: #dcfce7; color: #166534; }
        .sync-indicator.syncing { background: #fef3c7; color: #92400e; }
        .sync-indicator.offline { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCizpepFhRRBw8Dqxq6PUTCm5hoO61uL8s",
            authDomain: "kpi-tracker-da9cf.firebaseapp.com",
            projectId: "kpi-tracker-da9cf",
            storageBucket: "kpi-tracker-da9cf.firebasestorage.app",
            messagingSenderId: "853432959333",
            appId: "1:853432959333:web:356e1c5c9f7d5ea230e18c",
            measurementId: "G-116YG1P9QK"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Firestore collection reference
        const DATA_DOC = 'shared_data';

        // Local Storage Helpers (fallback for local-only data)
        const loadData = (key, defaultValue) => {
            try {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : defaultValue;
            } catch { return defaultValue; }
        };
        const saveData = (key, value) => localStorage.setItem(key, JSON.stringify(value));

        // Default Data
        const defaultInvestigators = ['Dr. Smith', 'Dr. Johnson', 'Dr. Williams', 'Dr. Brown'];
        const defaultStudies = ['NBI-1065845-MDD3025', 'ITI-1284-301', 'CYB003-002', 'NMRA-335140-302', 'J2S-MC-GZMH'];
        const defaultMetrics = ['Participants Seen', 'Screens', 'Prescreens', 'Prescreens Flipped to Screen', 'Time for Visit (min)', 'Screen Fail'];
        const defaultAssessments = ['HAMD-17', 'PHQ-9', 'GAD-7', 'MADRS', 'CGI-S', 'C-SSRS'];

        // Chart Component using Chart.js
        const ChartComponent = ({ type, data, options }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (chartRef.current) {
                    chartRef.current.destroy();
                }
                if (canvasRef.current && data) {
                    chartRef.current = new Chart(canvasRef.current, {
                        type: type,
                        data: data,
                        options: options
                    });
                }
                return () => {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, [type, data, options]);

            return <canvas ref={canvasRef} style={{ maxHeight: '300px' }}></canvas>;
        };

        // Main App Component
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('syncing'); // 'synced', 'syncing', 'offline'
            
            // State - initialized empty, will load from Firestore
            const [investigators, setInvestigators] = useState(defaultInvestigators);
            const [studies, setStudies] = useState(defaultStudies);
            const [metrics, setMetrics] = useState(defaultMetrics);
            const [assessments, setAssessments] = useState(defaultAssessments);
            const [entries, setEntries] = useState([]);
            const [assessmentEntries, setAssessmentEntries] = useState([]);
            const [studyData, setStudyData] = useState({});
            const [randomizationData, setRandomizationData] = useState({});
            const [studyDetailsData, setStudyDetailsData] = useState({});
            const [defaultInvestigator, setDefaultInvestigator] = useState(() => loadData('kpi_default_investigator', ''));

            // Track if initial load is complete
            const initialLoadDone = useRef(false);

            // Load data from Firestore on mount
            useEffect(() => {
                const unsubscribe = db.collection('kpi_data').doc(DATA_DOC).onSnapshot(
                    (doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            setInvestigators(data.investigators || defaultInvestigators);
                            setStudies(data.studies || defaultStudies);
                            setMetrics(data.metrics || defaultMetrics);
                            setAssessments(data.assessments || defaultAssessments);
                            setEntries(data.entries || []);
                            setAssessmentEntries(data.assessmentEntries || []);
                            setStudyData(data.studyData || {});
                            setRandomizationData(data.randomizationData || {});
                            setStudyDetailsData(data.studyDetailsData || {});
                        }
                        setLoading(false);
                        initialLoadDone.current = true;
                        setSyncStatus('synced');
                    },
                    (error) => {
                        console.error("Firestore error:", error);
                        setSyncStatus('offline');
                        setLoading(false);
                        // Fall back to localStorage
                        setInvestigators(loadData('kpi_investigators', defaultInvestigators));
                        setStudies(loadData('kpi_studies', defaultStudies));
                        setMetrics(loadData('kpi_metrics', defaultMetrics));
                        setAssessments(loadData('kpi_assessments', defaultAssessments));
                        setEntries(loadData('kpi_entries', []));
                        setAssessmentEntries(loadData('kpi_assessment_entries', []));
                        setStudyData(loadData('kpi_study_data', {}));
                        setRandomizationData(loadData('kpi_randomization_data', {}));
                        setStudyDetailsData(loadData('kpi_study_details_data', {}));
                        initialLoadDone.current = true;
                    }
                );
                return () => unsubscribe();
            }, []);

            // Save to Firestore when data changes (debounced)
            const saveTimeoutRef = useRef(null);
            useEffect(() => {
                if (!initialLoadDone.current) return;
                
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                setSyncStatus('syncing');
                
                saveTimeoutRef.current = setTimeout(() => {
                    db.collection('kpi_data').doc(DATA_DOC).set({
                        investigators,
                        studies,
                        metrics,
                        assessments,
                        entries,
                        assessmentEntries,
                        studyData,
                        randomizationData,
                        studyDetailsData,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        setSyncStatus('synced');
                        // Also save to localStorage as backup
                        saveData('kpi_investigators', investigators);
                        saveData('kpi_studies', studies);
                        saveData('kpi_metrics', metrics);
                        saveData('kpi_assessments', assessments);
                        saveData('kpi_entries', entries);
                        saveData('kpi_assessment_entries', assessmentEntries);
                        saveData('kpi_study_data', studyData);
                        saveData('kpi_randomization_data', randomizationData);
                        saveData('kpi_study_details_data', studyDetailsData);
                    }).catch((error) => {
                        console.error("Save error:", error);
                        setSyncStatus('offline');
                    });
                }, 1000); // Debounce 1 second
            }, [investigators, studies, metrics, assessments, entries, assessmentEntries, studyData, randomizationData, studyDetailsData]);

            // Save default investigator locally only
            useEffect(() => { saveData('kpi_default_investigator', defaultInvestigator); }, [defaultInvestigator]);

            const tabs = [
                { id: 'dashboard', label: '📊 Dashboard' },
                { id: 'entry', label: '✏️ Data Entry' },
                { id: 'study', label: '🔬 Study' },
                { id: 'randomization', label: '🎲 Randomization' },
                { id: 'trends', label: '📈 Trends' },
                { id: 'studydetails', label: '📑 Study Details' },
                { id: 'records', label: '📁 Records' },
                { id: 'manage', label: '⚙️ Manage' }
            ];

            if (loading) {
                return (
                    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <div style={{ background: 'white', padding: '40px 60px', borderRadius: '16px', textAlign: 'center', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
                            <div style={{ fontSize: '48px', marginBottom: '16px' }}>🔬</div>
                            <h2 style={{ color: '#1e293b', marginBottom: '8px' }}>Loading KPI Tracker...</h2>
                            <p style={{ color: '#64748b' }}>Connecting to cloud database</p>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' }}>
                    <header style={{ background: 'rgba(255,255,255,0.95)', padding: '16px 24px', boxShadow: '0 4px 20px rgba(0,0,0,0.1)' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <h1 style={{ fontSize: '24px', fontWeight: 700, color: '#1e293b', margin: 0 }}>
                                    🔬 Investigator KPI Tracker
                                </h1>
                                <span className={`sync-indicator ${syncStatus}`}>
                                    {syncStatus === 'synced' && '☁️ Synced'}
                                    {syncStatus === 'syncing' && '🔄 Syncing...'}
                                    {syncStatus === 'offline' && '⚠️ Offline'}
                                </span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <label style={{ fontSize: '13px', fontWeight: 600, color: '#64748b' }}>Default Investigator:</label>
                                <select 
                                    value={defaultInvestigator} 
                                    onChange={e => setDefaultInvestigator(e.target.value)}
                                    style={{ padding: '8px 12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white', minWidth: '180px' }}
                                >
                                    <option value="">-- Select --</option>
                                    {[...investigators].sort((a, b) => a.localeCompare(b)).map(inv => <option key={inv} value={inv}>{inv}</option>)}
                                </select>
                            </div>
                        </div>
                        <nav style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    style={{
                                        padding: '10px 20px', border: 'none', borderRadius: '8px', cursor: 'pointer',
                                        fontWeight: 600, fontSize: '14px', transition: 'all 0.2s',
                                        background: activeTab === tab.id ? 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : '#f1f5f9',
                                        color: activeTab === tab.id ? 'white' : '#475569'
                                    }}>
                                    {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main style={{ padding: '24px', maxWidth: '1400px', margin: '0 auto' }}>
                        {activeTab === 'dashboard' && <Dashboard entries={entries} assessmentEntries={assessmentEntries} investigators={investigators} studies={studies} studyData={studyData} />}
                        {activeTab === 'entry' && <DataEntry investigators={investigators} studies={studies} metrics={metrics} entries={entries} setEntries={setEntries} assessments={assessments} assessmentEntries={assessmentEntries} setAssessmentEntries={setAssessmentEntries} defaultInvestigator={defaultInvestigator} />}
                        {activeTab === 'study' && <StudyTab studies={studies} studyData={studyData} setStudyData={setStudyData} />}
                        {activeTab === 'randomization' && <RandomizationTab studies={studies} randomizationData={randomizationData} setRandomizationData={setRandomizationData} />}
                        {activeTab === 'trends' && <Trends entries={entries} studies={studies} metrics={metrics} investigators={investigators} studyData={studyData} assessmentEntries={assessmentEntries} studyDetailsData={studyDetailsData} />}
                        {activeTab === 'studydetails' && <StudyDetails studies={studies} assessments={assessments} studyDetailsData={studyDetailsData} setStudyDetailsData={setStudyDetailsData} />}
                        {activeTab === 'records' && <Records entries={entries} setEntries={setEntries} assessmentEntries={assessmentEntries} setAssessmentEntries={setAssessmentEntries} investigators={investigators} studies={studies} assessments={assessments} metrics={metrics} />}
                        {activeTab === 'manage' && <Manage investigators={investigators} setInvestigators={setInvestigators} studies={studies} setStudies={setStudies} metrics={metrics} setMetrics={setMetrics} assessments={assessments} setAssessments={setAssessments} entries={entries} setEntries={setEntries} assessmentEntries={assessmentEntries} setAssessmentEntries={setAssessmentEntries} />}
                    </main>
                </div>
            );
        };

        // Card Component
        const Card = ({ children, title, style = {} }) => (
            <div style={{ background: 'white', borderRadius: '16px', padding: '24px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', ...style }}>
                {title && <h2 style={{ fontSize: '18px', fontWeight: 700, color: '#1e293b', marginBottom: '20px' }}>{title}</h2>}
                {children}
            </div>
        );

        // Dashboard Component
        const Dashboard = ({ entries, assessmentEntries, investigators, studies, studyData }) => {
            const [timePeriod, setTimePeriod] = useState('day');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [participantData] = useState(() => loadData('kpi_participant_data', {}));

            const filteredEntries = useMemo(() => {
                if (timePeriod === 'all') return entries;
                
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];
                
                if (timePeriod === 'day') {
                    return entries.filter(e => e.date === todayStr);
                }
                
                if (timePeriod === 'custom') {
                    return entries.filter(e => {
                        if (customStartDate && e.date < customStartDate) return false;
                        if (customEndDate && e.date > customEndDate) return false;
                        return true;
                    });
                }
                
                let startDate;
                if (timePeriod === 'week') {
                    startDate = new Date(now);
                    startDate.setDate(now.getDate() - 7);
                } else if (timePeriod === 'month') {
                    startDate = new Date(now);
                    startDate.setMonth(now.getMonth() - 1);
                }
                
                const startStr = startDate.toISOString().split('T')[0];
                return entries.filter(e => e.date >= startStr);
            }, [entries, timePeriod, customStartDate, customEndDate]);

            const filteredAssessmentEntries = useMemo(() => {
                if (timePeriod === 'all') return assessmentEntries;
                
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];
                
                if (timePeriod === 'day') {
                    return assessmentEntries.filter(e => e.date === todayStr);
                }
                
                if (timePeriod === 'custom') {
                    return assessmentEntries.filter(e => {
                        if (customStartDate && e.date < customStartDate) return false;
                        if (customEndDate && e.date > customEndDate) return false;
                        return true;
                    });
                }
                
                let startDate;
                if (timePeriod === 'week') {
                    startDate = new Date(now);
                    startDate.setDate(now.getDate() - 7);
                } else if (timePeriod === 'month') {
                    startDate = new Date(now);
                    startDate.setMonth(now.getMonth() - 1);
                }
                
                const startStr = startDate.toISOString().split('T')[0];
                return assessmentEntries.filter(e => e.date >= startStr);
            }, [assessmentEntries, timePeriod, customStartDate, customEndDate]);

            // Personal metrics from Data Entry
            const personalStats = useMemo(() => {
                const totalParticipants = filteredEntries.reduce((sum, e) => sum + (parseInt(e['Participants Seen']) || 0), 0);
                const totalScreens = filteredEntries.reduce((sum, e) => sum + (parseInt(e['Screens']) || 0), 0);
                const totalPrescreens = filteredEntries.reduce((sum, e) => sum + (parseInt(e['Prescreens']) || 0), 0);
                const screenFails = filteredEntries.reduce((sum, e) => sum + (parseInt(e['Screen Fail']) || 0), 0);
                const randomizations = filteredEntries.reduce((sum, e) => sum + (parseInt(e['Randomize']) || parseInt(e['Randomization']) || 0), 0);
                const avgScales = filteredAssessmentEntries.length > 0 
                    ? Math.round(filteredAssessmentEntries.length / (new Set(filteredAssessmentEntries.map(e => e.date)).size || 1) * 10) / 10 
                    : 0;
                return { totalParticipants, totalScreens, totalPrescreens, screenFails, randomizations, avgScales, totalScales: filteredAssessmentEntries.length };
            }, [filteredEntries, filteredAssessmentEntries]);

            // Study-wide totals from Study tab (current month)
            const studyTotals = useMemo(() => {
                const now = new Date();
                let periodKeys = [];
                
                if (timePeriod === 'day' || timePeriod === 'week' || timePeriod === 'month') {
                    // Current month only
                    periodKeys = [`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`];
                } else {
                    // All time - get all period keys
                    periodKeys = Object.keys(studyData);
                }
                
                let totalPS = 0, totalS = 0, totalR = 0, totalSF = 0;
                periodKeys.forEach(periodKey => {
                    Object.keys(studyData[periodKey] || {}).forEach(study => {
                        totalPS += studyData[periodKey][study]?.PS || 0;
                        totalS += studyData[periodKey][study]?.S || 0;
                        totalR += studyData[periodKey][study]?.R || 0;
                        totalSF += studyData[periodKey][study]?.SF || 0;
                    });
                });
                
                // Active and Total participants from participantData (persists across months)
                let totalAP = 0, totalTP = 0;
                Object.keys(participantData).forEach(study => {
                    totalAP += participantData[study]?.AP || 0;
                    totalTP += participantData[study]?.TP || 0;
                });
                
                return { totalPS, totalS, totalR, totalSF, totalAP, totalTP };
            }, [studyData, participantData, timePeriod]);

            const recentActivity = useMemo(() => {
                return [...filteredEntries].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            }, [filteredEntries]);

            const studyChartData = useMemo(() => {
                const breakdown = {};
                filteredEntries.forEach(e => {
                    const studyName = e.study.split('-')[0];
                    if (!breakdown[studyName]) breakdown[studyName] = { screens: 0, participants: 0 };
                    breakdown[studyName].screens += parseInt(e['Screens']) || 0;
                    breakdown[studyName].participants += parseInt(e['Participants Seen']) || 0;
                });
                const labels = Object.keys(breakdown);
                return {
                    labels,
                    datasets: [
                        { label: 'Screens', data: labels.map(l => breakdown[l].screens), backgroundColor: '#667eea', borderRadius: 4 },
                        { label: 'Participants', data: labels.map(l => breakdown[l].participants), backgroundColor: '#22c55e', borderRadius: 4 }
                    ]
                };
            }, [filteredEntries]);

            // Time per Visit chart data
            const timePerVisitData = useMemo(() => {
                const entriesWithTime = filteredEntries.filter(e => parseInt(e['Time for Visit (min)']) > 0);
                const grouped = {};
                entriesWithTime.forEach(e => {
                    if (!grouped[e.date]) {
                        grouped[e.date] = { total: 0, count: 0 };
                    }
                    grouped[e.date].total += parseInt(e['Time for Visit (min)']) || 0;
                    grouped[e.date].count += 1;
                });
                const sortedDates = Object.keys(grouped).sort();
                return {
                    labels: sortedDates,
                    datasets: [{
                        label: 'Avg Time per Visit (min)',
                        data: sortedDates.map(d => grouped[d].count > 0 ? Math.round(grouped[d].total / grouped[d].count) : 0),
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#06b6d4',
                        pointRadius: 5
                    }]
                };
            }, [filteredEntries]);

            // Participants Seen chart data
            const participantsSeenData = useMemo(() => {
                const grouped = {};
                filteredEntries.forEach(e => {
                    const participants = parseInt(e['Participants Seen']) || 0;
                    if (participants > 0) {
                        if (!grouped[e.date]) {
                            grouped[e.date] = 0;
                        }
                        grouped[e.date] += participants;
                    }
                });
                const sortedDates = Object.keys(grouped).sort();
                return {
                    labels: sortedDates,
                    datasets: [{
                        label: 'Participants Seen',
                        data: sortedDates.map(d => grouped[d]),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#8b5cf6',
                        pointRadius: 5
                    }]
                };
            }, [filteredEntries]);

            // Total Time Spent chart data (Visit Time vs Assessment Time)
            const totalTimeSpentData = useMemo(() => {
                // Group visit time by date
                const visitTimeByDate = {};
                filteredEntries.forEach(e => {
                    const time = parseInt(e['Time for Visit (min)']) || 0;
                    if (!visitTimeByDate[e.date]) {
                        visitTimeByDate[e.date] = 0;
                    }
                    visitTimeByDate[e.date] += time;
                });

                // Group assessment time by date
                const assessmentTimeByDate = {};
                filteredAssessmentEntries.forEach(e => {
                    const time = parseInt(e.duration) || 0;
                    if (!assessmentTimeByDate[e.date]) {
                        assessmentTimeByDate[e.date] = 0;
                    }
                    assessmentTimeByDate[e.date] += time;
                });

                // Combine all dates
                const allDates = [...new Set([...Object.keys(visitTimeByDate), ...Object.keys(assessmentTimeByDate)])].sort();
                
                return {
                    labels: allDates,
                    datasets: [
                        {
                            label: 'Visit Time (min)',
                            data: allDates.map(d => visitTimeByDate[d] || 0),
                            backgroundColor: '#667eea',
                            borderRadius: 4
                        },
                        {
                            label: 'Assessment Time (min)',
                            data: allDates.map(d => assessmentTimeByDate[d] || 0),
                            backgroundColor: '#f59e0b',
                            borderRadius: 4
                        }
                    ]
                };
            }, [filteredEntries, filteredAssessmentEntries]);

            return (
                <div style={{ display: 'grid', gap: '24px' }}>
                    <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                        {[
                            { id: 'day', label: 'Today' },
                            { id: 'week', label: 'This Week' },
                            { id: 'month', label: 'This Month' },
                            { id: 'all', label: 'All Time' },
                            { id: 'custom', label: 'Custom' }
                        ].map(period => (
                            <button key={period.id} onClick={() => setTimePeriod(period.id)}
                                style={{
                                    padding: '8px 16px', border: '2px solid', 
                                    borderColor: timePeriod === period.id ? '#667eea' : '#e2e8f0',
                                    borderRadius: '8px', cursor: 'pointer', fontWeight: 600, fontSize: '13px',
                                    background: timePeriod === period.id ? '#667eea' : 'white',
                                    color: timePeriod === period.id ? 'white' : '#64748b',
                                    transition: 'all 0.2s'
                                }}>
                                {period.label}
                            </button>
                        ))}
                        {timePeriod === 'custom' && (
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginLeft: '8px' }}>
                                <input 
                                    type="date" 
                                    value={customStartDate} 
                                    onChange={e => setCustomStartDate(e.target.value)}
                                    style={{ padding: '8px 12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '13px' }}
                                />
                                <span style={{ color: '#64748b', fontSize: '13px' }}>to</span>
                                <input 
                                    type="date" 
                                    value={customEndDate} 
                                    onChange={e => setCustomEndDate(e.target.value)}
                                    style={{ padding: '8px 12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '13px' }}
                                />
                            </div>
                        )}
                    </div>

                    {/* Personal Metrics from Data Entry */}
                    <div>
                        <h3 style={{ fontSize: '16px', fontWeight: 700, color: '#1e293b', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '8px' }}>

        // Data Entry Component
        const DataEntry = ({ investigators, studies, metrics, entries, setEntries, assessments, assessmentEntries, setAssessmentEntries, defaultInvestigator }) => {
            const [formData, setFormData] = useState({
                investigator: defaultInvestigator || investigators[0] || '',
                study: studies[0] || '',
                date: new Date().toISOString().split('T')[0]

            const [metricValues, setMetricValues] = useState({});
            const [saved, setSaved] = useState(false);

            // Update investigator when defaultInvestigator changes
            useEffect(() => {
                if (defaultInvestigator) {
                    setFormData(prev => ({ ...prev, investigator: defaultInvestigator }));
                    setAssessmentFormData(prev => ({ ...prev, investigator: defaultInvestigator }));
                }
            }, [defaultInvestigator]);

            // Assessment form state
            const [assessmentFormData, setAssessmentFormData] = useState({
                investigator: defaultInvestigator || investigators[0] || '',
                assessment: assessments[0] || '',
                study: studies[0] || '',
                duration: '',
                date: new Date().toISOString().split('T')[0]
            });
            const [assessmentSaved, setAssessmentSaved] = useState(false);

            const handleSave = () => {
                const entry = { ...formData, ...metricValues, id: Date.now() };
                setEntries([...entries, entry]);
                setMetricValues({});
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            const handleAssessmentSave = () => {
                if (!assessmentFormData.duration) return;
                const entry = { ...assessmentFormData, id: Date.now() };
                setAssessmentEntries([...assessmentEntries, entry]);
                setAssessmentFormData(prev => ({ ...prev, duration: '' }));
                setAssessmentSaved(true);
                setTimeout(() => setAssessmentSaved(false), 2000);
            };

            // Get recent entries (last 5)
            const recentKPIEntries = [...entries].sort((a, b) => b.id - a.id).slice(0, 5);

                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white' }}>
                                    {[...studies].sort((a, b) => a.localeCompare(b)).map(study => <option key={study} value={study}>{study}</option>)}

                            </div>
                        </div>

                        <h3 style={{ fontSize: '16px', fontWeight: 600, color: '#1e293b', marginBottom: '16px' }}>📊 Metrics</h3>

                                    <label style={{ display: 'block', fontSize: '13px', fontWeight: 500, color: '#64748b', marginBottom: '6px' }}>{metric}</label>
                                    <input type="number" min="0" value={metricValues[metric] || ''} onChange={e => setMetricValues({ ...metricValues, [metric]: e.target.value })}
                                        placeholder="0" style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px' }} />
                                </div>
                            ))}
                        </div>

                        <button onClick={handleSave}
                            style={{ width: '100%', padding: '14px', background: saved ? '#22c55e' : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: 'white', border: 'none', borderRadius: '10px', fontWeight: 600, fontSize: '16px', cursor: 'pointer', transition: 'all 0.3s' }}>

                    <Card title="📋 Log Assessment Time">

                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Investigator</label>
                                <select value={assessmentFormData.investigator} onChange={e => setAssessmentFormData({ ...assessmentFormData, investigator: e.target.value })}
                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white' }}>
                                    {[...investigators].sort((a, b) => a.localeCompare(b)).map(inv => <option key={inv} value={inv}>{inv}</option>)}
                                </select>
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Assessment</label>
                                <select value={assessmentFormData.assessment} onChange={e => setAssessmentFormData({ ...assessmentFormData, assessment: e.target.value })}
                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white' }}>
                                    {[...assessments].sort((a, b) => a.localeCompare(b)).map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Study</label>

                                        {recentKPIEntries.map(entry => (
                                            <div key={entry.id} style={{ padding: '10px 12px', background: '#f8fafc', borderRadius: '8px', border: '1px solid #e2e8f0' }}>

                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                                                    <span style={{ fontSize: '13px', fontWeight: 600, color: '#1e293b' }}>{entry.assessment}</span>
                                                    <span style={{ fontSize: '11px', color: '#94a3b8' }}>{entry.date}</span>

                            </div>
                        </div>

        // Assessments Component
        const Assessments = ({ assessments, setAssessments, studies, assessmentEntries, setAssessmentEntries }) => {
            const [formData, setFormData] = useState({
                assessment: assessments[0] || '',
                study: studies[0] || '',
                duration: '',
                date: new Date().toISOString().split('T')[0]
            });
            const [newAssessment, setNewAssessment] = useState('');
            const [saved, setSaved] = useState(false);

            const handleSave = () => {
                const entry = { ...formData, id: Date.now() };
                setAssessmentEntries([...assessmentEntries, entry]);
                setFormData({ ...formData, duration: '' });
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            const addAssessment = () => {
                if (newAssessment.trim() && !assessments.includes(newAssessment.trim())) {
                    setAssessments([...assessments, newAssessment.trim()]);
                    setNewAssessment('');
                }
            };

            return (
                <div style={{ display: 'grid', gap: '24px' }}>
                    <Card title="📋 Log Assessment">
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '20px' }}>
                            <input type="text" value={newAssessment} onChange={e => setNewAssessment(e.target.value)}
                                placeholder="Add new assessment type..." style={{ flex: 1, padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px' }} />
                            <button onClick={addAssessment}
                                style={{ padding: '12px 24px', background: '#22c55e', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>
                                + Add
                            </button>

                                <select value={formData.assessment} onChange={e => setFormData({ ...formData, assessment: e.target.value })}
                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white' }}>
                                    {[...assessments].sort((a, b) => a.localeCompare(b)).map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Study</label>
                                <select value={formData.study} onChange={e => setFormData({ ...formData, study: e.target.value })}
                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px', background: 'white' }}>
                                    {[...studies].sort((a, b) => a.localeCompare(b)).map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Duration (minutes)</label>
                                <input type="number" min="0" value={formData.duration} onChange={e => setFormData({ ...formData, duration: e.target.value })}
                                    placeholder="e.g., 30" style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px' }} />
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Date</label>
                                <input type="date" value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })}
                                    style={{ width: '100%', padding: '12px', border: '2px solid #e2e8f0', borderRadius: '8px', fontSize: '14px' }} />
                            </div>
                        </div>

                        <button onClick={handleSave}
                            style={{ width: '100%', padding: '14px', background: saved ? '#22c55e' : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: 'white', border: 'none', borderRadius: '10px', fontWeight: 600, fontSize: '16px', cursor: 'pointer' }}>
                            {saved ? '✓ Saved!' : '💾 Save Assessment'}
                        </button>
                    </Card>

                    <Card title="📊 Recent Assessments">
                        {assessmentEntries.length > 0 ? (
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                                    <thead>
                                        <tr style={{ background: '#f8fafc' }}>
                                            {['Assessment', 'Study', 'Duration', 'Date'].map(h => (
                                                <th key={h} style={{ padding: '12px', textAlign: 'left', fontSize: '13px', fontWeight: 600, color: '#64748b', borderBottom: '2px solid #e2e8f0' }}>{h}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {[...assessmentEntries].reverse().slice(0, 10).map(entry => (
                                            <tr key={entry.id}>
                                                <td style={{ padding: '12px', borderBottom: '1px solid #f1f5f9', fontWeight: 500 }}>{entry.assessment}</td>
                                                <td style={{ padding: '12px', borderBottom: '1px solid #f1f5f9', fontSize: '13px', color: '#64748b' }}>{entry.study}</td>
                                                <td style={{ padding: '12px', borderBottom: '1px solid #f1f5f9' }}>{entry.duration} min</td>
                                                <td style={{ padding: '12px', borderBottom: '1px solid #f1f5f9', fontSize: '13px', color: '#64748b' }}>{entry.date}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div style={{ textAlign: 'center', padding: '40px', color: '#94a3b8' }}>No assessments logged yet.</div>
                        )}
                    </Card>
                </div>
            );
        };

        // Trends Component
        const Trends = ({ entries, studies, metrics, investigators, studyData, assessmentEntries, studyDetailsData }) => {
            const [dateRange, setDateRange] = useState({ start: '', end: '' });
            const [selectedStudies, setSelectedStudies] = useState(studies);
            const [selectedMetric, setSelectedMetric] = useState(metrics[0] || '');
            const [selectedStudyMetric, setSelectedStudyMetric] = useState('PS');
            const [participantData] = useState(() => loadData('kpi_participant_data', {}));

            const studyMetricOptions = [
                { key: 'PS', label: 'Prescreen', color: '#f59e0b' },
                { key: 'S', label: 'Screen', color: '#3b82f6' },
                { key: 'R', label: 'Randomize', color: '#22c55e' },
                { key: 'SF', label: 'Screen Fail', color: '#ef4444' }
            ];

            // Helper functions for study details calculations
            const getStudyDetailsData = (study, visitType) => {
                const key = `${study}_${visitType}`;
                return studyDetailsData?.[key] || {
                    activeParticipants: participantData[study]?.AP || 0,
                    avgInvestigatorTime: '',
                    visitFrequency: 'weekly',
                    selectedAssessments: []
                };
            };

            const calculatePatientsPerWeek = (activeParticipants, frequency) => {
                const participants = parseInt(activeParticipants) || 0;
                switch (frequency) {
                    case 'weekly': return participants;
                    case 'bimonthly': return Math.round(participants / 2 * 10) / 10;
                    case 'monthly': return Math.round(participants / 4 * 10) / 10;
                    default: return participants;
                }
            };

            const calculateTimePerWeek = (avgTime, patientsPerWeek) => {
                const time = parseFloat(avgTime) || 0;
                return Math.round(time * patientsPerWeek * 10) / 10;
            };

            // Pie chart data for time per study per week (maintenance)
            const timePerStudyPieData = useMemo(() => {
                const pieColors = ['#667eea', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16', '#f97316', '#14b8a6'];
                
                const studyTimes = studies.map(study => {
                    const data = getStudyDetailsData(study, 'maintenance');
                    const activeParticipants = data.activeParticipants !== undefined ? data.activeParticipants : (participantData[study]?.AP || 0);
                    const patientsPerWeek = calculatePatientsPerWeek(parseInt(activeParticipants) || 0, data.visitFrequency);
                    const timePerWeek = calculateTimePerWeek(data.avgInvestigatorTime, patientsPerWeek);
                    return { study, timePerWeek };
                }).filter(item => item.timePerWeek > 0);

                return {
                    labels: studyTimes.map(item => item.study),
                    datasets: [{
                        data: studyTimes.map(item => item.timePerWeek),
                        backgroundColor: studyTimes.map((_, i) => pieColors[i % pieColors.length]),
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                };
            }, [studies, studyDetailsData, participantData]);

            const filteredData = useMemo(() => {
                return entries.filter(e => {
                    if (!selectedStudies.includes(e.study)) return false;
                    if (dateRange.start && new Date(e.date) < new Date(dateRange.start)) return false;
                    if (dateRange.end && new Date(e.date) > new Date(dateRange.end)) return false;
                    return true;
                }).sort((a, b) => new Date(a.date) - new Date(b.date));
            }, [entries, selectedStudies, dateRange]);

            const chartData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(e => {
                    if (!grouped[e.date]) grouped[e.date] = 0;
                    grouped[e.date] += parseInt(e[selectedMetric]) || 0;
                });
                const sortedDates = Object.keys(grouped).sort();
                return {
                    labels: sortedDates,
                    datasets: [{
                        label: selectedMetric,
                        data: sortedDates.map(d => grouped[d]),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#667eea',
                        pointRadius: 5
                    }]
                };
            }, [filteredData, selectedMetric]);

            // Study Tab Chart Data - aggregated by month
            const studyChartData = useMemo(() => {
                const months = Object.keys(studyData).sort();
                const filteredMonths = months.filter(month => {
                    if (dateRange.start) {
                        const startMonth = dateRange.start.substring(0, 7);
                        if (month < startMonth) return false;
                    }
                    if (dateRange.end) {
                        const endMonth = dateRange.end.substring(0, 7);
                        if (month > endMonth) return false;
                    }
                    return true;
                });

                const labels = filteredMonths.map(m => {
                    const [year, month] = m.split('-');
                    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    return `${monthNames[parseInt(month) - 1]} ${year}`;
                });

                const dataPoints = filteredMonths.map(month => {
                    let total = 0;
                    selectedStudies.forEach(study => {
                        total += studyData[month]?.[study]?.[selectedStudyMetric] || 0;
                    });
                    return total;
                });

                const metricConfig = studyMetricOptions.find(m => m.key === selectedStudyMetric);

                return {
                    labels,
                    datasets: [{
                        label: metricConfig?.label || selectedStudyMetric,
                        data: dataPoints,
                        borderColor: metricConfig?.color || '#667eea',
                        backgroundColor: `${metricConfig?.color}20` || 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: metricConfig?.color || '#667eea',
                        pointRadius: 5
                    }]
                };
            }, [studyData, selectedStudies, selectedStudyMetric, dateRange]);

            const toggleStudy = (study) => {
                setSelectedStudies(prev => prev.includes(study) ? prev.filter(s => s !== study) : [...prev, study]);
            };

            // Assessment Chart Data - average time per assessment type
            const assessmentChartData = useMemo(() => {
                const filtered = assessmentEntries.filter(e => {
                    if (!selectedStudies.includes(e.study)) return false;
                    if (dateRange.start && e.date < dateRange.start) return false;
                    if (dateRange.end && e.date > dateRange.end) return false;
                    return true;
                });

                const grouped = {};
                filtered.forEach(e => {
                    if (!grouped[e.assessment]) {
                        grouped[e.assessment] = { total: 0, count: 0 };
                    }
                    grouped[e.assessment].total += parseInt(e.duration) || 0;
                    grouped[e.assessment].count += 1;
                });

                const sortedAssessments = Object.keys(grouped).sort();
                const colors = ['#8b5cf6', '#f59e0b', '#3b82f6', '#22c55e', '#ef4444', '#06b6d4', '#ec4899', '#84cc16'];
                
                return {
                    labels: sortedAssessments,
                    datasets: [{
                        label: 'Average Time (minutes)',
                        data: sortedAssessments.map(a => grouped[a].count > 0 ? Math.round(grouped[a].total / grouped[a].count) : 0),
                        backgroundColor: sortedAssessments.map((_, i) => colors[i % colors.length]),
                        borderRadius: 6
                    }]
                };
            }, [assessmentEntries, selectedStudies, dateRange]);

            return (
                <div style={{ display: 'flex', gap: '24px' }}>
                    <div style={{ position: 'sticky', top: '24px', alignSelf: 'flex-start', width: '180px', flexShrink: 0 }}>
                        <div style={{ background: 'white', borderRadius: '12px', padding: '16px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', marginBottom: '12px' }}>
                            <label style={{ display: 'block', fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '6px', textTransform: 'uppercase' }}>Start Date</label>
                            <input type="date" value={dateRange.start} onChange={e => setDateRange({ ...dateRange, start: e.target.value })}
                                style={{ width: '100%', padding: '8px', border: '2px solid #e2e8f0', borderRadius: '6px', fontSize: '12px', marginBottom: '12px' }} />
                            <label style={{ display: 'block', fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '6px', textTransform: 'uppercase' }}>End Date</label>
                            <input type="date" value={dateRange.end} onChange={e => setDateRange({ ...dateRange, end: e.target.value })}
                                style={{ width: '100%', padding: '8px', border: '2px solid #e2e8f0', borderRadius: '6px', fontSize: '12px' }} />
                        </div>
                        <div style={{ background: 'white', borderRadius: '12px', padding: '16px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', marginBottom: '12px' }}>
                            <label style={{ display: 'block', fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '6px', textTransform: 'uppercase' }}>KPI Metric</label>
                            <select value={selectedMetric} onChange={e => setSelectedMetric(e.target.value)}
                                style={{ width: '100%', padding: '8px', border: '2px solid #e2e8f0', borderRadius: '6px', fontSize: '12px', background: 'white' }}>
                                {[...metrics].sort((a, b) => a.localeCompare(b)).map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        </div>
                        <div style={{ background: 'white', borderRadius: '12px', padding: '16px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }}>
                            <label style={{ display: 'block', fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '10px', textTransform: 'uppercase' }}>Studies</label>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', maxHeight: '400px', overflowY: 'auto', paddingRight: '4px' }}>
                                {[...studies].sort((a, b) => a.localeCompare(b)).map(study => (
                                    <button key={study} onClick={() => toggleStudy(study)}
                                        style={{ 
                                            padding: '8px 10px', border: '2px solid', textAlign: 'left',
                                            borderColor: selectedStudies.includes(study) ? '#667eea' : '#e2e8f0', 
                                            borderRadius: '6px', 
                                            background: selectedStudies.includes(study) ? '#667eea' : 'white', 
                                            color: selectedStudies.includes(study) ? 'white' : '#64748b', 
                                            fontSize: '12px', fontWeight: 500, cursor: 'pointer',
                                            lineHeight: '1.3', wordBreak: 'break-word', minHeight: '36px'
                                        }}>
                                        {study.split('-')[0]}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ flex: 1, display: 'grid', gap: '24px' }}>
                        <Card title={`📈 ${selectedMetric} Over Time`}>
                            {filteredData.length > 0 ? (
                                <ChartComponent 
                                    type="line" 
                                    data={chartData}
                                    options={{ 
                                        responsive: true, 
                                        maintainAspectRatio: true,
                                        plugins: { legend: { position: 'bottom' }},
                                        scales: { y: { beginAtZero: true }}
                                    }}
                                />
                            ) : (
                                <div style={{ textAlign: 'center', padding: '80px 20px', color: '#94a3b8' }}>
                                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>📈</div>
                                    <p>No data matches your filters. Try adjusting the date range or studies.</p>
                                </div>
                            )}
                        </Card>

                        <Card title="🔬 Study Tab Metrics Over Time">
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, color: '#374151', marginBottom: '8px' }}>Study Metric</label>
                                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                    {studyMetricOptions.map(m => (
                                        <button key={m.key} onClick={() => setSelectedStudyMetric(m.key)}
                                            style={{ 
                                                padding: '8px 16px', border: '2px solid', 
                                                borderColor: selectedStudyMetric === m.key ? m.color : '#e2e8f0',
                                                borderRadius: '8px', cursor: 'pointer', fontWeight: 600, fontSize: '13px',
                                                background: selectedStudyMetric === m.key ? m.color : 'white',
                                                color: selectedStudyMetric === m.key ? 'white' : '#64748b',
                                                transition: 'all 0.2s'
                                            }}>
                                            {m.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {studyChartData.labels.length > 0 ? (
                                <ChartComponent 
                                    type="line" 
                                    data={studyChartData}
                                    options={{ 
                                        responsive: true, 
                                        maintainAspectRatio: true,
                                        plugins: { legend: { position: 'bottom' }},
                                        scales: { y: { beginAtZero: true }}
                                    }}
                                />
                            ) : (
                                <div style={{ textAlign: 'center', padding: '80px 20px', color: '#94a3b8' }}>
                                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>🔬</div>
                                    <p>No study data available. Enter data in the Study tab first.</p>
                                </div>
                            )}
                        </Card>

                        <Card title="📋 Average Assessment Time">
                            {assessmentChartData.labels.length > 0 ? (
                                <ChartComponent 
                                    type="bar" 
                                    data={assessmentChartData}
                                    options={{ 
                                        responsive: true, 
                                        maintainAspectRatio: true,
                                        plugins: { legend: { display: false }},
                                        scales: { y: { beginAtZero: true, title: { display: true, text: 'Minutes' }}}
                                    }}
                                />
                            ) : (
                                <div style={{ textAlign: 'center', padding: '80px 20px', color: '#94a3b8' }}>
                                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>📋</div>
                                    <p>No assessment data matches your filters. Log assessments in the Assessments tab.</p>
                                </div>
                            )}
                        </Card>

                        <Card title="🥧 Time per Study per Week (Maintenance)">
                            {timePerStudyPieData.labels.length > 0 ? (
                                <PieChartWithLegend data={timePerStudyPieData} />
                            ) : (
                                <div style={{ textAlign: 'center', padding: '80px 20px', color: '#94a3b8' }}>
                                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>🥧</div>
                                    <p>No study time data available. Enter maintenance data in the Study Details tab.</p>
                                </div>
                            )}
                        </Card>
                    </div>
                </div>
            );
        };

        // Custom Pie Chart with Collapsible Legend
        const PieChartWithLegend = ({ data }) => {
            const [legendOpen, setLegendOpen] = useState(false);
            const total = data.datasets[0].data.reduce((a, b) => a + b, 0);

            return (
                <div>
                    <div style={{ maxWidth: '500px', margin: '0 auto' }}>
                        <ChartComponent 
                            type="pie" 
                            data={data}
                            options={{ 
                                responsive: true, 
                                maintainAspectRatio: true,
                                plugins: { 
                                    legend: { display: false },
                                    tooltip: {
                                        callbacks: {
                                            label: function(context) {
                                                const value = context.raw;
                                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                                const percentage = Math.round((value / total) * 100);
                                                return `${context.label}: ${value} min (${percentage}%)`;
                                            }
                                        }
                                    }
                                }
                            }}
                        />
                    </div>
                    
                    {/* Collapsible Legend */}
                    <div style={{ marginTop: '16px', borderTop: '1px solid #e2e8f0', paddingTop: '12px' }}>
                        <button 
                            onClick={() => setLegendOpen(!legendOpen)}
                            style={{ 
                                display: 'flex', 
                                alignItems: 'center', 
                                gap: '8px', 
                                background: 'none', 
                                border: 'none', 
                                cursor: 'pointer', 
                                fontSize: '13px', 
                                fontWeight: 600, 
                                color: '#64748b',
                                padding: '8px 0',
                                width: '100%'
                            }}
                        >
                            <span style={{ transform: legendOpen ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>▶</span>
                            Legend ({data.labels.length} studies)
                        </button>
                        
                        {legendOpen && (
                            <div style={{ 
                                display: 'grid', 
                                gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', 
                                gap: '8px 24px', 
                                marginTop: '8px',
                                padding: '12px',
                                background: '#f8fafc',
                                borderRadius: '8px'
                            }}>
                                {data.labels.map((label, i) => {
                                    const value = data.datasets[0].data[i];
                                    const percentage = Math.round((value / total) * 100);
                                    return (
                                        <div key={label} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <div style={{ 
                                                width: '12px', 
                                                height: '12px', 
                                                borderRadius: '50%', 
                                                background: data.datasets[0].backgroundColor[i],
                                                flexShrink: 0
                                            }}></div>
                                            <span style={{ fontSize: '11px', color: '#475569', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                {label} ({value}m, {percentage}%)
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // StudyDetails Component
        const StudyDetails = ({ studies, assessments, studyDetailsData, setStudyDetailsData }) => {
            const [participantData] = useState(() => loadData('kpi_participant_data', {}));
            const [studyActiveStatus] = useState(() => loadData('kpi_study_active_status', {}));
            const [expandedStudies, setExpandedStudies] = useState({});
            const [visitTypes, setVisitTypes] = useState(() => loadData('kpi_study_visit_types', {}));

            // Save visit types
            useEffect(() => { saveData('kpi_study_visit_types', visitTypes); }, [visitTypes]);

            const isStudyEnrolling = (study) => studyActiveStatus[study] !== false;

            const getVisitType = (study) => visitTypes[study] || 'screen';

            const setVisitType = (study, type) => {
                setVisitTypes(prev => ({ ...prev, [study]: type }));
            };

            const getStudyData = (study, visitType) => {
                const key = `${study}_${visitType}`;
                return studyDetailsData[key] || {
                    activeParticipants: participantData[study]?.AP || 0,
                    avgInvestigatorTime: '',
                    visitFrequency: 'weekly',
                    selectedAssessments: []
                };
            };

            const updateStudyData = (study, visitType, field, value) => {
                const key = `${study}_${visitType}`;
                const current = getStudyData(study, visitType);
                setStudyDetailsData(prev => ({
                    ...prev,
                    [key]: {
                        ...current,
                        [field]: value
                    }
                }));
            };

            const toggleAssessment = (study, visitType, assessment) => {
                const current = getStudyData(study, visitType);
                const selected = current.selectedAssessments || [];
                const newSelected = selected.includes(assessment)
                    ? selected.filter(a => a !== assessment)
                    : [...selected, assessment];
                updateStudyData(study, visitType, 'selectedAssessments', newSelected);
            };

            const toggleExpanded = (study) => {
                setExpandedStudies(prev => ({
                    ...prev,
                    [study]: !prev[study]
                }));
            };

            const calculatePatientsPerWeek = (activeParticipants, frequency) => {
                const participants = parseInt(activeParticipants) || 0;
                switch (frequency) {
                    case 'weekly': return participants;
                    case 'bimonthly': return Math.round(participants / 2 * 10) / 10;
                    case 'monthly': return Math.round(participants / 4 * 10) / 10;
                    default: return participants;
                }
            };

            const calculateTimePerWeek = (avgTime, patientsPerWeek) => {
                const time = parseFloat(avgTime) || 0;
                return Math.round(time * patientsPerWeek * 10) / 10;
            };

            const visitTypeOptions = [
                { id: 'screen', label: 'Screen', color: '#3b82f6' },
                { id: 'baseline', label: 'Baseline', color: '#8b5cf6' },
                { id: 'maintenance', label: 'Maintenance', color: '#22c55e' }
            ];

            // Calculate totals for dashboard - use maintenance data for time calculations
            const summaryTotals = useMemo(() => {
                let totalActiveParticipants = 0;
                let totalMaintenanceTimePerWeek = 0;
                
                studies.forEach(study => {
                    // For active participants, use maintenance data
                    const maintenanceData = getStudyData(study, 'maintenance');
                    const activeParticipants = maintenanceData.activeParticipants !== undefined ? maintenanceData.activeParticipants : (participantData[study]?.AP || 0);
                    const patientsPerWeek = calculatePatientsPerWeek(parseInt(activeParticipants) || 0, maintenanceData.visitFrequency);
                    const timePerWeek = calculateTimePerWeek(maintenanceData.avgInvestigatorTime, patientsPerWeek);
                    
                    totalActiveParticipants += parseInt(activeParticipants) || 0;
                    totalMaintenanceTimePerWeek += timePerWeek;
                });
                
                return { totalActiveParticipants, totalMaintenanceTimePerWeek: Math.round(totalMaintenanceTimePerWeek * 10) / 10 };
            }, [studies, studyDetailsData, participantData]);

            return (
                <div style={{ display: 'grid', gap: '20px' }}>
                    {/* Summary Dashboard */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px' }}>
                        <div style={{ background: 'white', borderRadius: '12px', padding: '20px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', borderTop: '4px solid #8b5cf6' }}>
                            <div style={{ fontSize: '24px', marginBottom: '4px' }}>👥</div>
                            <div style={{ fontSize: '32px', fontWeight: 700, color: '#8b5cf6' }}>{summaryTotals.totalActiveParticipants}</div>
                            <div style={{ fontSize: '12px', color: '#64748b', marginTop: '2px' }}>Total Active Participants</div>
                        </div>
                        <div style={{ background: 'white', borderRadius: '12px', padding: '20px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', borderTop: '4px solid #22c55e' }}>
                            <div style={{ fontSize: '24px', marginBottom: '4px' }}>⏱️</div>
                            <div style={{ fontSize: '32px', fontWeight: 700, color: '#22c55e' }}>
                                {summaryTotals.totalMaintenanceTimePerWeek}
                                <span style={{ fontSize: '14px', fontWeight: 500, color: '#64748b', marginLeft: '8px' }}>
                                    ({(summaryTotals.totalMaintenanceTimePerWeek / 60).toFixed(1)} hrs)
                                </span>
                            </div>
                            <div style={{ fontSize: '12px', color: '#64748b', marginTop: '2px' }}>Maintenance Avg Investigator Time/Week (min)</div>
                        </div>
                    </div>

                    <Card title="📑 Study Details">
                        {studies.length === 0 ? (
                            <div style={{ textAlign: 'center', padding: '60px 20px', color: '#94a3b8' }}>
                                <div style={{ fontSize: '48px', marginBottom: '16px' }}>📑</div>
                                <p>No studies added yet. Add studies in the Manage tab.</p>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                                {[...studies].sort((a, b) => a.localeCompare(b)).map(study => {
                                    const currentVisitType = getVisitType(study);
                                    const data = getStudyData(study, currentVisitType);
                                    const activeParticipants = data.activeParticipants !== undefined ? data.activeParticipants : (participantData[study]?.AP || 0);
                                    const patientsPerWeek = calculatePatientsPerWeek(activeParticipants, data.visitFrequency);
                                    const timePerWeek = calculateTimePerWeek(data.avgInvestigatorTime, patientsPerWeek);
                                    const isExpanded = expandedStudies[study];
                                    const isMaintenance = currentVisitType === 'maintenance';
                                    const highlightStyle = { boxShadow: '0 0 0 3px rgba(102, 126, 234, 0.3)', borderColor: '#667eea' };

                                    return (
                                        <div key={study} style={{ background: '#f8fafc', borderRadius: '12px', padding: '20px', border: '2px solid #e2e8f0' }}>
                                            {/* Study Title and Visit Type Toggle */}
                                            <div style={{ marginBottom: '16px' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px' }}>
                                                    <div style={{ fontSize: '24px' }}>🔬</div>
                                                    <h3 style={{ fontSize: '16px', fontWeight: 700, color: '#1e293b', margin: 0 }}>{study}</h3>
                                                    <span style={{ 
                                                        fontSize: '12px', 
                                                        fontWeight: 600, 
                                                        color: isStudyEnrolling(study) ? '#22c55e' : '#ef4444',
                                                        marginLeft: '4px'
                                                    }}>
                                                        {isStudyEnrolling(study) ? 'Actively Enrolling' : 'Not Enrolling'}
                                                    </span>
                                                </div>
                                                
                                                {/* Three-way Toggle */}
                                                <div style={{ display: 'inline-flex', borderRadius: '8px', overflow: 'hidden', border: '2px solid #e2e8f0' }}>
                                                    {visitTypeOptions.map((option, idx) => (
                                                        <button
                                                            key={option.id}
                                                            onClick={() => setVisitType(study, option.id)}
                                                            style={{
                                                                padding: '8px 16px',
                                                                border: 'none',
                                                                borderRight: idx < 2 ? '1px solid #e2e8f0' : 'none',
                                                                background: currentVisitType === option.id ? option.color : 'white',
                                                                color: currentVisitType === option.id ? 'white' : '#64748b',
                                                                fontSize: '13px',
                                                                fontWeight: 600,
                                                                cursor: 'pointer',
                                                                transition: 'all 0.2s'
                                                            }}
                                                        >
                                                            {option.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Row 1: Active Participants, Avg Investigator Time */}
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                                                <div>
                                                    <label style={{ display: 'block', fontSize: '11px', fontWeight: 600, color: '#64748b', marginBottom: '4px', textTransform: 'uppercase' }}>Active Participants</label>
                                                    <input 
                                                        type="number" 
                                                        min="0"
                                                        value={activeParticipants}
